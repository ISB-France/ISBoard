name: Deploy — Recette

on:
  push:
    branches: [recette]

concurrency:
  group: deploy-recette
  cancel-in-progress: true

jobs:
  deploy:
    name: Déploiement serveur privé (recette)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Déploiement via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH_RECETTE }}
            git pull origin recette
            docker compose \
              -f deploy/docker-compose.recette.yml \
              --env-file /etc/isboard/recette.env \
              -p isboard-recette \
              up -d --build
            docker image prune -f
            echo "✅ Recette déployée"
