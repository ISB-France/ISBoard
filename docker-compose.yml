services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-isboard}
      POSTGRES_USER: ${DB_USER:-isboard}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-isboard}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./app/backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
    volumes:
      - ./app/backend:/app

  frontend:
    build: ./app/frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./app/frontend:/app
      - /app/node_modules

volumes:
  pgdata:
